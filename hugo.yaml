baseURL: https://marianajo.github.io/
title: Mariana Jó
theme: PaperMod
enableRobotsTXT: true
defaultContentLanguage: pt-br
defaultContentLanguageInSubdir: false

pagination:
  pagerSize: 10

caches:
  images:
    dir: :cacheDir/images

outputFormats:
  RSS_DEVTO:
    baseName: devto
    mediaType: application/rss+xml
  RSS_SUBSTACK:
    baseName: substack
    mediaType: application/rss+xml

outputs:
  home:
    - HTML
    - RSS
    - RSS_DEVTO
    - RSS_SUBSTACK

taxonomies:
  tag: tags
  category: categories

params:
  env: production
  defaultTheme: auto
  disableThemeToggle: false
  displayFullLangName: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: false
  ShowShareButtons: false
  ShowToc: false
  ShowRssButtonInSectionTermList: true
  mainSections:
    - posts

languages:
  pt-br:
    languageCode: pt-BR
    languageName: Português
    weight: 1
    params:
      description: 
      footer:
        text: 
      mainSections:
        - posts
      homeInfoParams:
        Title: Mariana Jó
        Content: |
          Um espaço para escrever: um lugar para pensar em público sobre dados, tecnologia, música, jogos e o que mais quiser. Comece por [Posts](posts/) ou [Sobre](about/).

          ### No momento

          - 🎮 **Jogando:** Death Stranding (Director's Cut), PS5
          - 📚 **Lendo:** Na Ponta da Língua, Caetano W. Galindo
          - 🎧 **Ouvindo:** [Low Roar](https://open.spotify.com/artist/5WoWlP0ihSFIxnppxjwSgE?si=p26_NT2lTXqI0P-D9uJgYw)
          - 📺 **Assistindo:** The Bear, Hacks, Euphoria
    menus:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: categories
          name: Categorias
          url: /categories/
          weight: 15
        - identifier: about
          name: Sobre
          url: /about/
          weight: 20

  en:
    languageCode: en-US
    languageName: English
    weight: 2
    params:
      description: 
      footer:
        text: 
      mainSections:
        - posts
      homeInfoParams:
        Title: Mariana Jó
        Content: |
          A space to write: a place to think in public about data, technology, music, games and whatever I want. Start in [Posts](en/posts/) or [About](en/about/).

          ### Currently

          - 🎮 **Playing:** Death Stranding (Director's Cut), PS5
          - 📚 **Reading:** Na Ponta da Língua, Caetano W. Galindo
          - 🎧 **Listening to:** [Low Roar](https://open.spotify.com/artist/5WoWlP0ihSFIxnppxjwSgE?si=p26_NT2lTXqI0P-D9uJgYw)
          - 📺 **Watching:** The Bear, Hacks, Euphoria
    menus:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: categories
          name: Categories
          url: /categories/
          weight: 15
        - identifier: about
          name: About
          url: /about/
          weight: 20

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
